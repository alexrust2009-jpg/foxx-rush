        .page {
            display: none;
            height: 100%;
            width: 100%;
            position: absolute;
            top: 0;
            text-align: center;
            overflow-y: auto;
            padding-bottom: 120px;
            box-sizing: border-box;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .page.active {
            display: block;
            opacity: 1;
        }

        .top-bar {

            justify-content: space-around;
            padding: 15px;

        .stat-val {

            font-weight: bold;
            color: var(--text-main);
            font-size: 14px;
            margin-top: 3px;
        }

            align-items: center;
            justify-content: center;
            gap: 12px;
            color: var(--cyan);
            text-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
        }
