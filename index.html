<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fox Rush</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --orange: #ff8c00; --bg: #0b0b0b; --card: #1c1c1c; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 0; overflow: hidden; touch-action: manipulation; }
        
        /* Страницы */
        .page { display: none; height: 100vh; width: 100%; position: absolute; top: 0; text-align: center; }
        .page.active { display: block; }
        
        /* Статистика */
        .top-bar { display: flex; justify-content: space-around; padding: 15px; background: #000; border-bottom: 1px solid #333; }
        .stat-item { font-size: 11px; color: #aaa; }
        .stat-val { display: block; font-weight: bold; color: #fff; font-size: 14px; }

        /* Баланс и Лиса */
        .balance-box { margin-top: 30px; font-size: 42px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .fox-btn { 
            width: 270px; height: 270px; margin: 30px auto; 
            border-radius: 50%; border: 8px solid #222; 
            overflow: hidden; cursor: pointer; transition: transform 0.05s; 
        }
        .fox-btn img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        .fox-btn:active { transform: scale(0.95); }

        /* Меню */
        .nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #161616; border-top: 1px solid #333; padding: 12px 0; z-index: 100; }
        .nav-btn { flex: 1; color: #666; font-size: 11px; cursor: pointer; text-align: center; }
        .nav-btn.active { color: var(--orange); }
        .nav-btn i { display: block; font-size: 22px; margin-bottom: 4px; }

        /* Магазин */
        .card { background: var(--card); margin: 15px; padding: 15px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; }
        .buy-btn { background: var(--orange); border: none; padding: 10px 15px; border-radius: 10px; color: #fff; font-weight: bold; cursor: pointer; }
        .buy-btn:disabled { background: #444; color: #888; }

        /* Энергия */
        .energy-box { position: fixed; bottom: 85px; width: 100%; padding: 0 25px; box-sizing: border-box; }
        .bar { width: 100%; height: 10px; background: #222; border-radius: 10px; margin-top: 5px; }
        #fill { width: 100%; height: 100%; background: var(--orange); border-radius: 10px; transition: width 0.3s; }

        /* Анимация клика */
        .pop { position: absolute; color: #fff; font-size: 32px; font-weight: bold; pointer-events: none; animation: up 0.7s ease-out forwards; }
        @keyframes up { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-100px); } }
    </style>
</head>
<body>

    <div id="game" class="page active">
        <div class="top-bar">
            <div class="stat-item">За тап<br><span id="t-val" class="stat-val">+1</span></div>
            <div class="stat-item">Лига<br><span class="stat-val" style="color:var(--orange)">Master</span></div>
            <div class="stat-item">Доход/час<br><span id="p-val" class="stat-val">0</span></div>
        </div>
        <div class="balance-box">
            <img src="https://cdn-icons-png.flaticon.com/512/217/217853.png" width="35">
            <span id="b-disp">0</span>
        </div>
        <div class="fox-btn" id="clicker"><img src="logo.jpg"></div>
        <div class="energy-box">
            <div style="font-size: 13px; text-align: left;">⚡ <span id="e-val">1000</span>/1000</div>
            <div class="bar"><div id="fill"></div></div>
        </div>
    </div>

    <div id="shop" class="page">
        <h2 style="margin-top:25px; color:var(--orange)">Магазин</h2>
        <div class="card">
            <div style="text-align:left"><b>Острые когти</b><br><small>Тап +2 монет</small><br><span style="color:#ffd700">Цена: 1000</span></div>
            <button class="buy-btn" onclick="buyItem('tap', 1000, 2, this)">Купить</button>
        </div>
        <div class="card">
            <div style="text-align:left"><b>Ночной охотник</b><br><small>Доход +150/час</small><br><span style="color:#ffd700">Цена: 500</span></div>
            <button class="buy-btn" onclick="buyItem('mine', 500, 150, this)">Купить</button>
        </div>
        <div class="card">
            <div style="text-align:left"><b>Скрытая нора</b><br><small>Доход +400/час</small><br><span style="color:#ffd700">Цена: 2500</span></div>
            <button class="buy-btn" onclick="buyItem('mine', 2500, 400, this)">Купить</button>
        </div>
    </div>

    <div id="friends" class="page">
        <h2 style="margin-top:25px; color:var(--orange)">Друзья</h2>
        <div class="card" style="flex-direction: column; gap: 15px; padding: 30px;">
            <p style="margin:0">Приглашай друзей и получай бонусы!</p>
