<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fox Rush</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
:root {
    --cyan: #00e5ff;
    --bg-dark: #050509;
    --bg-light: #10121e;
    --text-main: #fff;
    --text-muted: #8b8e9f;
}

body {
    background: linear-gradient(to bottom, var(--bg-dark), var(--bg-light));
    color: var(--text-main);
    font-family: Arial;
    margin: 0;
    overflow: hidden;
}

/* ЛИСА */
.fox-btn {
    width: 260px;
    height: 260px;
    margin: 80px auto;
    border-radius: 50%;
    overflow: hidden;
    position: relative;
}

.fox-btn img {
    width: 100%;
    height: 100%;
}

/* 💥 АНИМАЦИЯ ТАПА */
@keyframes tapBounce {
    0% { transform: scale(1); }
    50% { transform: scale(0.9); }
    100% { transform: scale(1); }
}

@keyframes tapGlow {
    0% { box-shadow: 0 0 10px rgba(0,229,255,0.3); }
    50% { box-shadow: 0 0 40px rgba(0,229,255,1); }
    100% { box-shadow: 0 0 10px rgba(0,229,255,0.3); }
}

.fox-tap {
    animation: tapBounce 0.2s ease, tapGlow 0.4s ease;
}

/* ВСПЫШКА */
.fox-btn::before {
    content: '';
    position: absolute;
    width: 120%;
    height: 120%;
    top: -10%;
    left: -10%;
    background: radial-gradient(circle, rgba(0,229,255,0.4), transparent 60%);
    opacity: 0;
    transition: opacity 0.2s;
}

.fox-btn.flash::before {
    opacity: 1;
}

/* +1 текст */
.pop {
    position: absolute;
    color: var(--cyan);
    font-size: 30px;
    font-weight: bold;
    animation: up 0.6s forwards;
}

@keyframes up {
    0% { opacity:1; transform: translateY(0); }
    100% { opacity:0; transform: translateY(-100px); }
}

/* баланс */
.balance {
    text-align: center;
    font-size: 40px;
    margin-top: 40px;
    color: var(--cyan);
}
</style>
</head>

<body>

<div class="balance" id="balance">0</div>

<div class="fox-btn" id="clicker">
    <img src="logo.jpg">
</div>

<script>
let balance = 0;
let energy = 1000;
let tapValue = 1;

const tg = window.Telegram.WebApp;
const clicker = document.getElementById('clicker');

function update() {
    document.getElementById('balance').innerText = balance;
}

/* 🎯 ТАП (РАБОТАЕТ И НА ТЕЛЕФОНЕ И НА ПК) */
function handleTap(e) {
    let touch = e.touches ? e.touches[0] : e;

    if (energy <= 0) return;

    let gain = Math.min(tapValue, energy);
    balance += gain;
    energy -= gain;

    update();

    /* 💥 АНИМАЦИЯ */
    clicker.classList.add('fox-tap', 'flash');
    setTimeout(() => {
        clicker.classList.remove('fox-tap', 'flash');
    }, 200);

    /* +1 */
    let p = document.createElement('div');
    p.className = 'pop';
    p.innerText = `+${gain}`;

    p.style.left = (touch.clientX - 10) + 'px';
    p.style.top = (touch.clientY - 20) + 'px';

    document.body.appendChild(p);
    setTimeout(() => p.remove(), 600);

    if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
}

/* 👇 ВАЖНО */
clicker.addEventListener('click', handleTap);
clicker.addEventListener('touchstart', handleTap);

tg.expand();
update();
</script>

</body>
</html>
