<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fox Rush</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --orange: #ff8c00; --dark-bg: #0b0b0b; --card-bg: #1c1c1c; }
        body { background: var(--dark-bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow: hidden; user-select: none; }

        /* Анимация появления страницы */
        .page { display: none; height: 100vh; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Шапка */
        .top-bar { display: flex; justify-content: space-around; padding: 15px; background: rgba(255,140,0,0.1); border-bottom: 1px solid #333; }
        .stat-item { text-align: center; font-size: 11px; color: #aaa; }
        .stat-value { display: block; color: white; font-weight: bold; font-size: 13px; }

        /* Баланс */
        .balance-container { text-align: center; margin-top: 20px; }
        .balance-amount { font-size: 40px; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .balance-amount img { width: 35px; }

        /* Главная лиса и анимация клика */
        .fox-main { position: relative; width: 75vw; height: 75vw; max-width: 320px; margin: 30px auto; border-radius: 50%; border: 6px solid #222; box-shadow: 0 0 30px rgba(255,140,0,0.1); overflow: hidden; cursor: pointer; transition: transform 0.05s; }
        .fox-main img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        
        /* Класс для анимации толчка при клике */
        .fox-main.bump { transform: scale(0.92); }

        /* Вкладки (Контент страниц) */
        .content-area { padding: 20px; text-align: center; }
        .card { background: var(--card-bg); padding: 15px; border-radius: 15px; margin-bottom: 10px; border: 1px solid #333; }

        /* Нижнее меню */
        .nav-menu { position: fixed; bottom: 0; width: 100%; display: flex; background: var(--card-bg); padding: 12px 0; border-top: 1px solid #333; }
        .nav-item { flex: 1; text-align: center; color: #666; font-size: 10px; cursor: pointer; transition: 0.2s; }
        .nav-item i { display: block; font-size: 22px; margin-bottom: 4px; }
        .nav-item.active { color: var(--orange); transform: translateY(-3px); }

        /* Энергия */
        .energy-section { position: fixed; bottom: 85px; width: 100%; padding: 0 20px; box-sizing: border-box; }
        .progress-bg { width: 100%; height: 8px; background: #333; border-radius: 10px; margin-top: 5px; }
        #energy-fill { width: 100%; height: 100%; background: var(--orange); border-radius: 10px; }

        .floating-text { position: absolute; color: white; font-size: 28px; font-weight: bold; pointer-events: none; z-index: 100; animation: floatUp 0.8s ease-out forwards; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-120px) scale(1.2); } }
    </style>
</head>
<body>

    <div id="exchange" class="page active">
        <div class="top-bar">
            <div class="stat-item">Прибыль за тап<br><span class="stat-value">+1</span></div>
            <div class="stat-item">Лига<br><span class="stat-value" style="color:var(--orange)">Bronze</span></div>
            <div class="stat-item">Прибыль в час<br><span class="stat-value" id="pph-display">+0</span></div>
        </div>
        <div class="balance-container">
            <div class="balance-amount"><img src="https://cdn-icons-png.flaticon.com/512/217/217853.png"> <span id="balance">0</span></div>
        </div>
        <div class="fox-main" id="click-area">
            <img src="logo.jpg" alt="Fox">
        </div>
        <div class="energy-section">
            <div style="font-size: 12px;">⚡ <span id="energy">1000</span> / 1000</div>
            <div class="progress-bg"><div id="energy-fill"></div></div>
        </div>
    </div>

    <div id="mine" class="page">
        <div class="content-area">
            <h2>Майнинг</h2>
            <div class="card">
                <h3>Улучшить лису</h3>
                <p>Прибыль в час: +100</p>
                <button style="background:var(--orange); border:none; padding:10px 20px; border-radius:10px; color:white;">Купить за 1000</button>
            </div>
        </div>
    </div>

    <div id="friends" class="page">
        <div class="content-area">
            <h2>Пригласи друзей</h2>
            <div class="card">За каждого друга +5,000 монет</div>
            <button style="width:100%; background:#248bcf; border:none; padding:15px; border-radius:10px; color:white; font-weight:bold;">Пригласить друга</button>
        </div>
    </div>

    <nav class="nav-menu">
        <div class="nav-item active" onclick="showPage('exchange', this)"><i class="fas fa-university"></i>Exchange</div>
        <div class="nav-item" onclick="showPage('mine', this)"><i class="fas fa-hammer"></i>Mine</div>
        <div class="nav-item" onclick="showPage('friends', this)"><i class="fas fa-users"></i>Friends</div>
        <div class="nav-item" onclick="showPage('exchange', this)"><i class="fas fa-coins"></i>Earn</div>
    </nav>

    <script>
        let balance = 0;
        let energy = 1000;
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Функция переключения вкладок
        function showPage(pageId, element) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            element.classList.add('active');
            
            tg.HapticFeedback.impactOccurred('light');
        }

        const clickArea = document.getElementById('click-area');
        
        clickArea.addEventListener('click', (e) => {
            if (energy > 0) {
                balance++;
                energy--;
                
                // Эффект нажатия (анимация)
                clickArea.classList.add('bump');
                setTimeout(() => clickArea.classList.remove('bump'), 50);

                updateUI();
                createPop(e.clientX, e.clientY);
                tg.HapticFeedback.impactOccurred('medium');
            }
        });

        function updateUI() {
            document.getElementById('balance').innerText = Math.floor(balance);
            document.getElementById('energy').innerText = energy;
            document.getElementById('energy-fill').style.width = (energy/10) + '%';
        }

        function createPop(x, y) {
            const el = document.createElement('div');
            el.className = 'floating-text';
            el.innerText = '+1';
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 800);
        }

        // Реген энергии
        setInterval(() => {
            if (energy < 1000) { energy++; updateUI(); }
        }, 1500);
    </script>
</body>
</html>
