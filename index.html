<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fox Rush</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        :root {
            --orange: #ff8c00;
            --blue: #00e5ff; /* Добавим синий цвет из фона */
            --dark: #0a0a0a;
            --overlay: rgba(10, 10, 10, 0.7); /* Оверлей для лучшей читаемости */
        }

        body {
            /* Подключаем ваш фон */
            background-image: url('logo.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            /* Делаем оверлей, чтобы затемнить фон и выделить текст */
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            touch-action: manipulation;
            
            height: 100vh;
            width: 100vw;
        }

        /* Оверлей для всего приложения */
        .page::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--overlay);
            z-index: -1;
        }

        /* Страницы */
        .page {
            display: none;
            height: 100%;
            width: 100%;
            position: absolute;
            top: 0;
            left: 0;
            text-align: center;
            overflow-y: auto;
            padding-bottom: 120px; /* Для навигации */
            box-sizing: border-box;
            z-index: 1;
        }

        .page.active {
            display: block;
        }

        /* Статистика сверху */
        .top-bar {
            display: flex;
            justify-content: space-around;
            padding: 15px;
            background: rgba(0, 0, 0, 0.8);
            border-bottom: 2px solid var(--blue); /* Используем синий */
            box-shadow: 0 4px 10px rgba(0, 229, 255, 0.3);
        }

        .stat-item {
            font-size: 11px;
            color: #aaa;
            text-transform: uppercase;
        }

        .stat-val {
            display: block;
            font-weight: bold;
            color: #fff;
            font-size: 14px;
            margin-top: 3px;
        }

        /* Баланс и Лиса */
        .balance-box {
            margin-top: 40px;
            font-size: 48px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            color: var(--blue); /* Используем синий */
            text-shadow: 0 0 10px var(--blue);
        }

        .fox-btn {
            width: 280px;
            height: 280px;
            margin: 30px auto;
            border-radius: 50%;
            border: 8px solid var(--blue); /* Синий ободок */
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.05s, box-shadow 0.2s;
            position: relative;
            z-index: 2;
            
            background-color: #000;
            background-image: url('logo.jpg');
            background-size: 150%; /* Сделаем его частью фона */
            background-position: center;
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.5);
        }

        .fox-btn img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
        }

        .fox-btn:active {
            transform: scale(0.95);
            box-shadow: 0 0 50px rgba(255, 140, 0, 0.7); /* Оранжевое свечение при клике */
        }

        /* Меню навигации */
        .nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            display: flex;
            background: rgba(10, 10, 10, 0.95);
            border-top: 2px solid var(--blue);
            padding: 12px 0;
            z-index: 100;
            box-shadow: 0 -4px 10px rgba(0, 229, 255, 0.2);
        }

        .nav-btn {
            flex: 1;
            color: #666;
            font-size: 10px;
            cursor: pointer;
            text-align: center;
            transition: color 0.2s, transform 0.2s;
        }

        .nav-btn i {
            display: block;
            font-size: 24px;
            margin-bottom: 5px;
        }

        .nav-btn.active {
            color: var(--blue);
            transform: translateY(-3px);
            text-shadow: 0 0 5px var(--blue);
        }

        /* Карточки магазина */
        .card {
            background: rgba(30, 30, 30, 0.8);
            margin: 15px 25px;
            padding: 18px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #333;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            transition: border-color 0.2s;
        }

        .card:hover {
            border-color: var(--blue);
        }

        .buy-btn {
            background: var(--blue);
            color: #000;
            border: none;
            padding: 10px 18px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .buy-btn:disabled {
            background: #444;
            color: #888;
            cursor: not-allowed;
        }

        .buy-btn:active:not(:disabled) {
            transform: scale(0.95);
        }

        /* Энергия */
        .energy-box {
            position: fixed;
            bottom: 90px;
            width: 100%;
            padding: 0 25px;
            box-sizing: border-box;
            z-index: 50;
        }

        .bar {
            width: 100%;
            height: 10px;
            background: rgba(50, 50, 50, 0.8);
            border-radius: 10px;
            margin-top: 5px;
            border: 1px solid #333;
        }

        #fill {
            width: 100%;
            height: 100%;
            background: var(--blue);
            border-radius: 10px;
            transition: width 0.3s ease-out;
            box-shadow: 0 0 5px var(--blue);
        }

        /* Анимация клика */
        .pop {
            position: absolute;
            color: #fff;
            font-size: 36px;
            font-weight: bold;
            pointer-events: none;
            animation: up 0.7s ease-out forwards;
            z-index: 1000;
            text-shadow: 0 0 5px #000;
        }

        @keyframes up {
            from {
                opacity: 1;
                transform: translateY(0);
            }
            to {
                opacity: 0;
                transform: translateY(-100px);
            }
        }
    </style>
</head>
<body>

    <div id="game" class="page active">
        <div class="top-bar">
            <div class="stat-item">За тап<br><span id="t-val" class="stat-val">+1</span></div>
            <div class="stat-item">Лига<br><span class="stat-val" style="color:var(--orange)">Bronze</span></div>
            <div class="stat-item">Доход/час<br><span id="p-val" class="stat-val">0</span></div>
        </div>
        
        <div class="balance-box">
            <i class="fas fa-coins" style="font-size: 35px;"></i> <span id="b-disp">0</span>
        </div>
        
        <div class="fox-btn" id="clicker">
            <img src="logo.jpg">
        </div>
        
        <div class="energy-box">
            <div style="font-size: 13px; text-align: left;">⚡ <span id="e-val">1000</span>/1000</div>
            <div class="bar"><div id="fill"></div></div>
        </div>
    </div>

    <div id="shop" class="page">
        <h2 style="margin-top:25px; color:var(--blue); text-shadow: 0 0 5px var(--blue);">МАГАЗИН УЛУЧШЕНИЙ</h2>
        
        <div class="card">
            <div style="text-align:left">
                <b>Острые когти</b><br>
                <small>Тап +2 монет</small><br>
                <span style="color:#ffd700">Цена: 1000</span>
            </div>
            <button class="buy-btn" onclick="buyItem('tap', 1000, 2, this)">Купить</button>
        </div>
        
        <div class="card">
            <div style="text-align:left">
                <b>Ночной охотник</b><br>
                <small>Доход +150/час</small><br>
                <span style="color:#ffd700">Цена: 500</span>
            </div>
            <button class="buy-btn" onclick="buyItem('mine', 500, 150, this)">Купить</button>
        </div>
        
        <div class="card">
            <div style="text-align:left">
                <b>Скрытая нора</b><br>
                <small>Доход +400/час</small><br>
                <span style="color:#ffd700">Цена: 2500</span>
            </div>
            <button class="buy-btn" onclick="buyItem('mine', 2500, 400, this)">Купить</button>
        </div>
    </div>

    <div id="friends" class="page">
        <h2 style="margin-top:25px; color:var(--blue); text-shadow: 0 0 5px var(--blue);">ТВОЯ КОМАНДА</h2>
        <div class="card" style="flex-direction: column; gap: 15px; padding: 30px; text-align: center;">
            <i class="fas fa-user-friends" style="font-size: 60px; color: var(--blue);"></i>
            <p style="margin:10px 0; font-size: 16px;">Приглашай друзей и получай бонусы за каждого нового лиса!</p>
            <button class="buy-btn" style="width:100%; padding:15px; font-size: 16px;" onclick="invite()">Пригласить друга</button>
        </div>
    </div>

    <div class="nav">
        <div class="nav-btn active" onclick="showTab('game', this)"><i class="fas fa-coins"></i>Exchange</div>
        <div class="nav-btn" onclick="showTab('shop', this)"><i class="fas fa-hammer"></i>Mine</div>
        <div class="nav-btn" onclick="showTab('friends', this)"><i class="fas fa-user-friends"></i>Friends</div>
    </nav>

    <script>
        let balance = 0, energy = 1000, pph = 0, tapValue = 1;
        const tg = window.Telegram.WebApp;

        // Показываем только ту вкладку, на которую нажали
        function showTab(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            
            // Убираем класс 'active' у всех кнопок и добавляем той, что нажали
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            
            // Легкая вибрация при переключении
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        // Логика покупки в магазине
        function buyItem(type, price, val, btn) {
            if (balance >= price) {
                balance -= price;
                if (type === 'tap') tapValue += val; // Повышаем силу тапа
                else pph += val; // Повышаем пассивный доход
                
                btn.innerText = "OK";
                btn.disabled = true;
                
                updateVisuals();
                if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            } else {
                tg.showAlert("Недостаточно монет!");
            }
        }

        // Логика тапа по лисе
        document.getElementById('clicker').onclick = (e) => {
            if (energy > 0) {
                let gain = Math.min(tapValue, energy);
                balance += gain; 
                energy -= gain;
                
                updateVisuals();
                
                // Всплывающее число в месте клика
                let p = document.createElement('div');
                p.className = 'pop'; p.innerText = `+${gain}`;
                
                // Учитываем прокрутку, если она есть
                p.style.left = e.clientX + 'px'; 
                p.style.top = e.clientY + 'px';
                
                document.body.appendChild(p);
                // Удаляем число через 0.6 секунды
                setTimeout(() => p.remove(), 600);
                
                // Вибрация средней силы
                if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            }
        };

        // Логика кнопки "Пригласить друга"
        function invite() {
            const link = "https://t.me/FoxRush_bot"; // Ссылка на твоего бота
            tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=Давай тапать лису вместе в Fox Rush!`);
        }

        // Обновление всех данных на экране
        function updateVisuals() {
            document.getElementById('b-disp').innerText = Math.floor(balance).toLocaleString();
            document.getElementById('e-val').innerText = energy;
            document.getElementById('fill').style.width = (energy/10) + '%';
            document.getElementById('p-val').innerText = pph;
            document.getElementById('t-val').innerText = `+${tapValue}`;
        }

        // Таймеры (интервалы)
        // 1. Регенерация энергии (+2 в секунду)
        setInterval(() => { 
            if(energy < 1000) { 
                energy = Math.min(1000, energy + 2); 
                updateVisuals(); 
            } 
        }, 1000);
        
        // 2. Начисление пассивного дохода
        setInterval(() => { 
            if(pph > 0) { 
                balance += (pph/3600); // Распределяем доход на каждую секунду
                updateVisuals(); 
            } 
        }, 1000);
        
        // Первая отрисовка данных
        updateVisuals();
        
        // Инициализация WebApp
        tg.expand();
    </script>
</body>
</html>
