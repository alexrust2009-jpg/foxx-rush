<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fox Rush</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --orange: #ff8c00; --dark-bg: #0b0b0b; --card-bg: #1c1c1c; }
        body { background: var(--dark-bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow: hidden; user-select: none; }

        .page { display: none; height: 100vh; animation: fadeIn 0.2s ease; overflow-y: auto; padding-bottom: 100px; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Шапка */
        .top-bar { display: flex; justify-content: space-around; padding: 15px; background: rgba(255,140,0,0.1); border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 10; background: var(--dark-bg); }
        .stat-item { text-align: center; font-size: 11px; color: #aaa; }
        .stat-value { display: block; color: white; font-weight: bold; font-size: 13px; }

        /* Баланс */
        .balance-container { text-align: center; margin-top: 20px; }
        .balance-amount { font-size: 40px; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .balance-amount img { width: 35px; }

        /* Лиса */
        .fox-main { position: relative; width: 70vw; height: 70vw; max-width: 300px; margin: 20px auto; border-radius: 50%; border: 6px solid #222; box-shadow: 0 0 30px rgba(255,140,0,0.1); overflow: hidden; cursor: pointer; transition: transform 0.05s; }
        .fox-main img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        .fox-main.bump { transform: scale(0.92); }

        /* Карточки улучшений */
        .content-area { padding: 20px; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 20px; margin-bottom: 15px; border: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .card-info h3 { margin: 0; font-size: 16px; color: var(--orange); }
        .card-info p { margin: 5px 0 0; font-size: 12px; color: #888; }
        .buy-btn { background: var(--orange); border: none; padding: 10px 15px; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; }
        .buy-btn:disabled { background: #444; color: #888; }

        /* Меню */
        .nav-menu { position: fixed; bottom: 0; width: 100%; display: flex; background: var(--card-bg); padding: 12px 0; border-top: 1px solid #333; }
        .nav-item { flex: 1; text-align: center; color: #666; font-size: 10px; cursor: pointer; }
        .nav-item i { display: block; font-size: 22px; margin-bottom: 4px; }
        .nav-item.active { color: var(--orange); }

        .energy-section { position: fixed; bottom: 85px; width: 100%; padding: 0 20px; box-sizing: border-box; }
        .progress-bg { width: 100%; height: 8px; background: #333; border-radius: 10px; }
        #energy-fill { width: 100%; height: 100%; background: var(--orange); border-radius: 10px; transition: width 0.3s; }

        .floating-text { position: absolute; color: white; font-size: 32px; font-weight: bold; pointer-events: none; animation: floatUp 0.8s ease-out forwards; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-120px); } }
    </style>
</head>
<body>

    <div id="exchange" class="page active">
        <div class="top-bar">
            <div class="stat-item">За тап<br><span class="stat-value">+1</span></div>
            <div class="stat-item">Лига<br><span class="stat-value" style="color:var(--orange)">Bronze</span></div>
            <div class="stat-item">Доход в час<br><span class="stat-value" id="pph-display">0</span></div>
        </div>
        <div class="balance-container">
            <div class="balance-amount"><img src="https://cdn-icons-png.flaticon.com/512/217/217853.png"> <span id="balance">0</span></div>
        </div>
        <div class="fox-main" id="click-area">
            <img src="logo.jpg" alt="Fox">
        </div>
        <div class="energy-section">
            <div style="font-size: 12px; margin-bottom: 5px;">⚡ <span id="energy">1000</span> / 1000</div>
            <div class="progress-bg"><div id="energy-fill"></div></div>
        </div>
    </div>

    <div id="mine" class="page">
        <div class="content-area">
            <h2 style="text-align: center;">Улучшения</h2>
            <div class="card">
                <div class="card-info">
                    <h3>Ночной охотник</h3>
                    <p>Доход: +150 / час</p>
                    <p style="color: #ffd700;">Цена: 500</p>
                </div>
                <button class="buy-btn" onclick="buyUpgrade(500, 150, this)">Купить</button>
            </div>
            <div class="card">
                <div class="card-info">
                    <h3>Быстрые лапы</h3>
                    <p>Доход: +500 / час</p>
                    <p style="color: #ffd700;">Цена: 2500</p>
                </div>
                <button class="buy-btn" onclick="buyUpgrade(2500, 500, this)">Купить</button>
            </div>
        </div>
    </div>

    <div id="friends" class="page">
        <div class="content-area" style="text-align: center;">
            <h2>Друзья</h2>
            <div class="card" style="display: block;">
                <p>Приглашайте друзей и получайте бонусы!</p>
                <button onclick="window.Telegram.WebApp.openTelegramLink('https://t.me/share/url?url=t.me/your_bot')" style="width:100%; background:#248bcf; border:none; padding:15px; border-radius:12px; color:white; font-weight:bold;">Пригласить</button>
            </div>
        </div>
    </div>

    <nav class="nav-menu">
        <div class="nav-item active" onclick="showPage('exchange', this)"><i class="fas fa-coins"></i>Exchange</div>
        <div class="nav-item" onclick="showPage('mine', this)"><i class="fas fa-hammer"></i>Mine</div>
        <div class="nav-item" onclick="showPage('friends', this)"><i class="fas fa-users"></i>Friends</div>
    </nav>

    <script>
        let balance = 0;
        let energy = 1000;
        let pph = 0; // Доход в час
        const tg = window.Telegram.WebApp;
        tg.expand();

        function showPage(pageId, element) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            element.classList.add('active');
            tg.HapticFeedback.impactOccurred('light');
        }

        function buyUpgrade(price, income, btn) {
            if (balance >= price) {
                balance -= price;
                pph += income;
                updateUI();
                tg.HapticFeedback.notificationOccurred('success');
                btn.innerText = "Куплено";
                btn.disabled = true;
            } else {
                tg.showAlert("Недостаточно монет!");
            }
        }

        const clickArea = document.getElementById('click-area');
        clickArea.addEventListener('click', (e) => {
            if (energy > 0) {
                balance++;
                energy--;
                clickArea.classList.add('bump');
                setTimeout(() => clickArea.classList.remove('bump'), 50);
                updateUI();
                createPop(e.clientX, e.clientY);
                tg.HapticFeedback.impactOccurred('medium');
            }
        });

        function updateUI() {
            document.getElementById('balance').innerText = Math.floor(balance).toLocaleString();
            document.getElementById('energy').innerText = energy;
            document.getElementById('energy-fill').style.width = (energy/10) + '%';
            document.getElementById('pph-display').innerText = `+${pph}`;
        }

        function createPop(x, y) {
            const el = document.createElement('div');
            el.className = 'floating-text';
            el.innerText = '+1';
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 800);
        }

        // Регенерация энергии
        setInterval(() => {
            if (energy < 1000) { energy++; updateUI(); }
        }, 1500);

        // Пассивный доход (начисляется каждые 3 секунды для экономии ресурсов)
        setInterval(() => {
            if (pph > 0) {
                balance += (pph / 1200); // 3600 сек в часе / 3 сек интервал
                updateUI();
            }
        }, 3000);
    </script>
</body>
</html>
