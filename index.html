<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fox Rush</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        :root { --orange: #ff8c00; --bg: #0b0b0b; --card: #1c1c1c; }
        body { 
            background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding: 0; overflow: hidden; touch-action: manipulation; height: 100vh;
        }
        
        .page { display: none; height: 100%; width: 100%; position: absolute; top: 0; text-align: center; overflow-y: auto; padding-bottom: 120px; box-sizing: border-box; }
        .page.active { display: block; }

        /* Верхняя панель */
        .top-bar { display: flex; justify-content: space-around; padding: 15px; background: #000; border-bottom: 1px solid #333; }
        .stat-item { font-size: 10px; color: #aaa; text-transform: uppercase; }
        .stat-val { display: block; font-weight: bold; color: #fff; font-size: 14px; margin-top: 2px; }

        /* Центр */
        .balance-box { margin-top: 35px; font-size: 44px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .fox-btn { 
            width: 270px; height: 270px; margin: 30px auto; 
            border-radius: 50%; border: 6px solid #222; 
            overflow: hidden; cursor: pointer; transition: transform 0.05s; 
            box-shadow: 0 0 20px rgba(255,140,0,0.1);
        }
        .fox-btn img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        .fox-btn:active { transform: scale(0.95); }

        /* Навигация */
        .nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #161616; border-top: 1px solid #333; padding: 12px 0; z-index: 100; }
        .nav-btn { flex: 1; color: #666; font-size: 11px; cursor: pointer; text-align: center; transition: 0.2s; }
        .nav-btn i { display: block; font-size: 22px; margin-bottom: 4px; }
        .nav-btn.active { color: var(--orange); }

        /* Магазин */
        .section-title { color: var(--orange); font-size: 13px; text-align: left; padding: 0 20px; margin: 20px 0 10px; text-transform: uppercase; letter-spacing: 1px; }
        .card { background: var(--card); margin: 8px 20px; padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; }
        .buy-btn { background: var(--orange); color: #fff; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; min-width: 80px; }
        .buy-btn:disabled { background: #444; color: #888; cursor: not-allowed; }

        /* Энергия */
        .energy-box { position: fixed; bottom: 85px; width: 100%; padding: 0 25px; box-sizing: border-box; }
        .bar { width: 100%; height: 8px; background: #222; border-radius: 10px; margin-top: 5px; }
        #fill { width: 100%; height: 100%; background: var(--orange); border-radius: 10px; transition: width 0.3s; }

        .pop { position: absolute; color: #fff; font-size: 32px; font-weight: bold; pointer-events: none; animation: up 0.7s forwards; z-index: 1000; }
        @keyframes up { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-100px); } }
    </style>
</head>
<body>

    <div id="game" class="page active">
        <div class="top-bar">
            <div class="stat-item">За тап<br><span id="t-val" class="stat-val">+1</span></div>
            <div class="stat-item">Лига<br><span class="stat-val" style="color:var(--orange)">Master</span></div>
            <div class="stat-item">В час<br><span id="p-val" class="stat-val">0</span></div>
        </div>
        <div class="balance-box"><img src="https://cdn-icons-png.flaticon.com/512/217/217853.png" width="35"> <span id="b-disp">0</span></div>
        <div class="fox-btn" id="clicker"><img src="logo.jpg"></div>
        <div class="energy-box">
            <div style="font-size: 12px; text-align: left;">⚡ <span id="e-val">1000</span>/1000</div>
            <div class="bar"><div id="fill"></div></div>
        </div>
    </div>

    <div id="shop" class="page">
        <h2 style="margin-top:20px; color:var(--orange)">МАЙНИНГ</h2>
        
        <div class="section-title">Сила тапа</div>
        <div class="card">
            <div style="text-align:left"><b>Острые когти</b><br><small>Тап +2</small><br><span style="color:#ffd700">1,000</span></div>
            <button class="buy-btn" onclick="buyItem('tap', 1000, 2, this)">Купить</button>
        </div>
        <div class="card">
            <div style="text-align:left"><b>Лисий прыжок</b><br><small>Тап +5</small><br><span style="color:#ffd700">5,000</span></div>
            <button class="buy-btn" onclick="buyItem('tap', 5000, 5, this)">Купить</button>
        </div>

        <div class="section-title">Пассивный доход</div>
        <div class="card">
            <div style="text-align:left"><b>Ночной охотник</b><br><small>+150/час</small><br><span style="color:#ffd700">500</span></div>
            <button class="buy-btn" onclick="buyItem('mine', 500, 150, this)">Купить</button>
        </div>
        <div class="card">
            <div style="text-align:left"><b>Скрытая нора</b><br><small>+400/час</small><br><span style="color:#ffd700">2,500</span></div>
            <button class="buy-btn" onclick="buyItem('mine', 2500, 400, this)">Купить</button>
        </div>
        <div class="card">
            <div style="text-align:left"><b>Лесной альянс</b><br><small>+1,200/час</small><br><span style="color:#ffd700">10,000</span></div>
            <button class="buy-btn" onclick="buyItem('mine', 10000, 1200, this)">Купить</button>
        </div>
    </div>

    <div id="friends" class="page">
        <h2 style="margin-top:25px; color:var(--orange)">ДРУЗЬЯ</h2>
        <div class="card" style="flex-direction: column; gap: 15px; padding: 30px; text-align: center;">
            <i class="fas fa-user-friends" style="font-size: 50px; color: var(--orange);"></i>
            <p>Приглашай друзей и получай бонусы!</p>
            <button class="buy-btn" style="width:100%; padding:15px;" onclick="invite()">Пригласить друга</button>
        </div>
    </div>

    <div class="nav">
        <div class="nav-btn active" onclick="showTab('game', this)"><i class="fas fa-coins"></i>Exchange</div>
        <div class="nav-btn" onclick="showTab('shop', this)"><i class="fas fa-hammer"></i>Mine</div>
        <div class="nav-btn" onclick="showTab('friends', this)"><i class="fas fa-user-friends"></i>Friends</div>
    </div>

    <script>
        let balance = 0, energy = 1000, pph = 0, tapValue = 1;
        const tg = window.Telegram.WebApp;

        function showTab(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        function buyItem(type, price, val, btn) {
            if (balance >= price) {
                balance -= price;
                if (type === 'tap') tapValue += val;
                else pph += val;
                btn.innerText = "OK";
                btn.disabled = true;
                update();
                if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            } else {
                tg.showAlert("Недостаточно монет!");
            }
        }

        document.getElementById('clicker').onclick = (e) => {
            if (energy > 0) {
                let gain = Math.min(tapValue, energy);
                balance += gain; energy -= gain;
                update();
                let p = document.createElement('div');
                p.className = 'pop'; p.innerText = `+${gain}`;
                p.style.left = e.clientX + 'px'; p.style.top = e.clientY + 'px';
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 600);
                if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            }
        };

        function invite() {
            const link = "https://t.me/FoxRush_bot";
            tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=Давай тапать лису вместе!`);
        }

        function update() {
            document.getElementById('b-disp').innerText = Math.floor(balance).toLocaleString();
            document.getElementById('e-val').innerText = energy;
            document.getElementById('fill').style.width = (energy/10) + '%';
            document.getElementById('p-val').innerText = Math.floor(pph);
            document.getElementById('t-val').innerText = `+${tapValue}`;
        }

        setInterval(() => { if(energy < 1000) { energy = Math.min(1000, energy + 2); update(); } }, 1000);
        setInterval(() => { if(pph > 0) { balance += (pph/3600); update(); } }, 1000);
        
        tg.expand();
        update();
    </script>
</body>
</html>
