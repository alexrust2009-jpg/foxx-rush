<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fox Rush</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        :root { --cyan: #00e5ff; --bg-dark: #050509; --bg-light: #10121e; --card-bg: rgba(28, 30, 43, 0.9); }
        body { background-color: var(--bg-dark); background-image: linear-gradient(to bottom, var(--bg-dark), var(--bg-light)); color: #fff; font-family: sans-serif; margin: 0; padding: 0; overflow: hidden; touch-action: manipulation; height: 100vh; }
        
        .page { display: none; height: 100%; width: 100%; position: absolute; top: 0; text-align: center; overflow-y: auto; padding-bottom: 120px; box-sizing: border-box; }
        .page.active { display: block; }

        .top-bar { display: flex; justify-content: space-around; padding: 15px; background: rgba(0, 0, 0, 0.6); border-bottom: 1px solid rgba(0, 229, 255, 0.15); backdrop-filter: blur(5px); }
        .stat-item { font-size: 10px; color: #8b8e9f; text-transform: uppercase; }
        .stat-val { display: block; font-weight: bold; color: #fff; font-size: 14px; margin-top: 3px; }

        .balance-box { margin-top: 40px; font-size: 48px; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 12px; color: var(--cyan); text-shadow: 0 0 15px rgba(0, 229, 255, 0.4); }
        
        .fox-container { position: relative; width: 280px; height: 280px; margin: 30px auto; }
        .fox-btn { width: 100%; height: 100%; border-radius: 50%; border: 8px solid #1a1c2c; overflow: hidden; cursor: pointer; transition: transform 0.05s ease; box-shadow: 0 0 30px rgba(0, 229, 255, 0.1); }
        .fox-btn img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        .fox-btn:active { transform: scale(0.92); }

        .tap-anim { position: absolute; color: var(--cyan); font-size: 38px; font-weight: 900; pointer-events: none; z-index: 1000; text-shadow: 0 0 10px rgba(0, 229, 255, 0.8); animation: floatUp 0.7s ease-out forwards; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-140px); } }

        .nav { position: fixed; bottom: 0; width: 100%; display: flex; background: rgba(10, 12, 22, 0.95); border-top: 1px solid rgba(0, 229, 255, 0.1); padding: 12px 0; z-index: 100; }
        .nav-btn { flex: 1; color: #8b8e9f; font-size: 11px; cursor: pointer; text-align: center; }
        .nav-btn i { display: block; font-size: 22px; margin-bottom: 5px; }
        .nav-btn.active { color: var(--cyan); }

        .card { background: var(--card-bg); margin: 10px 20px; padding: 18px; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255, 255, 255, 0.03); }
        .buy-btn { background: var(--cyan); color: #000; border: none; padding: 12px 20px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        
        .energy-box { position: fixed; bottom: 90px; width: 100%; padding: 0 25px; box-sizing: border-box; }
        .bar { width: 100%; height: 10px; background: rgba(255, 255, 255, 0.05); border-radius: 10px; overflow: hidden; }
        #fill { width: 100%; height: 100%; background: linear-gradient(90deg, #0099ff, var(--cyan)); transition: width 0.3s ease; }
    </style>
</head>
<body>

    <div id="game" class="page active">
        <div class="top-bar">
            <div><span class="stat-item">За тап</span><span id="t-val" class="stat-val">+1</span></div>
            <div><span class="stat-item">Лига</span><span class="stat-val" style="color:var(--cyan)">Master</span></div>
            <div><span class="stat-item">В час</span><span id="p-val" class="stat-val">0</span></div>
        </div>
        <div class="balance-box"><i class="fas fa-coins"></i> <span id="b-disp">0</span></div>
        <div class="fox-container"><div class="fox-btn" id="clicker"><img src="logo.jpg"></div></div>
        <div class="energy-box">
            <div style="font-size: 13px; text-align: left; margin-bottom: 4px;">⚡ <span id="e-val">1000</span> / 1000</div>
            <div class="bar"><div id="fill"></div></div>
        </div>
    </div>

    <div id="shop" class="page">
        <h2 style="margin-top:20px;">МАЙНИНГ</h2>
        <div class="card">
            <div style="text-align:left"><b>Когти</b><br><small>Тап +2</small><br><span style="color:#ffd700">1,000</span></div>
            <button class="buy-btn" onclick="buyItem('tap', 1000, 2, this)">Купить</button>
        </div>
        <div class="card">
            <div style="text-align:left"><b>Охотник</b><br><small>+150/час</small><br><span style="color:#ffd700">500</span></div>
            <button class="buy-btn" onclick="buyItem('mine', 500, 150, this)">Купить</button>
        </div>
    </div>

    <div id="friends" class="page">
        <h2 style="margin-top:25px;">ДРУЗЬЯ</h2>
        <button class="buy-btn" style="width:80%; padding:18px;" onclick="invite()">Пригласить</button>
    </div>

    <div class="nav">
        <div class="nav-btn active" onclick="showTab('game', this)"><i class="fas fa-coins"></i>Exchange</div>
        <div class="nav-btn" onclick="showTab('shop', this)"><i class="fas fa-hammer"></i>Mine</div>
        <div class="nav-btn" onclick="showTab('friends', this)"><i class="fas fa-user-friends"></i>Friends</div>
    </div>

    <script>
        let balance = 0, energy = 1000, pph = 0, tapValue = 1;
        const tg = window.Telegram.WebApp;

        function showTab(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }

        function buyItem(type, price, val, btn) {
            if (balance >= price) {
                balance -= price;
                if (type === 'tap') tapValue += val;
                else pph += val;
                btn.innerText = "OK";
                btn.disabled = true;
                update();
            }
        }

        document.getElementById('clicker').onclick = function(e) {
            if (energy > 0) {
                let gain = Math.min(tapValue, energy);
                balance += gain; energy -= gain;
