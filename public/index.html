<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fox Rush</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root { --cyan: #00e5ff; --bg-dark: #050509; --bg-light: #10121e; --card-bg: rgba(28, 30, 43, 0.9); --text-main: #fff; --text-muted: #8b8e9f; --bronze: #cd7f32; --silver: #c0c0c0; --gold: #ffd700; --diamond: #b9f2ff; }
        body { background-color: var(--bg-dark); background-image: radial-gradient(circle at top right, rgba(0, 229, 255, 0.05), transparent 400px), linear-gradient(to bottom, var(--bg-dark), var(--bg-light)); color: var(--text-main); font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0; overflow: hidden; touch-action: manipulation; height: 100vh; }
        .page { display: none; height: 100%; width: 100%; position: absolute; top: 0; text-align: center; overflow-y: auto; padding-bottom: 120px; box-sizing: border-box; opacity: 0; transition: opacity 0.3s ease; }
        .page.active { display: block; opacity: 1; }
        .top-bar { display: flex; justify-content: space-around; padding: 15px; background: rgba(0, 0, 0, 0.6); border-bottom: 1px solid rgba(0, 229, 255, 0.15); backdrop-filter: blur(5px); }
        .stat-item { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .stat-val { display: block; font-weight: bold; color: var(--text-main); font-size: 14px; margin-top: 3px; }
        .balance-box { margin-top: 40px; font-size: 48px; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 12px; color: var(--cyan); text-shadow: 0 0 15px rgba(0, 229, 255, 0.4); }
        .fox-btn { width: 280px; height: 280px; margin: 30px auto; border-radius: 50%; border: 8px solid #1a1c2c; overflow: hidden; cursor: pointer; transition: transform 0.05s; box-shadow: 0 0 30px rgba(0, 229, 255, 0.1); position: relative; -webkit-tap-highlight-color: transparent; }
        .fox-btn img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        .fox-btn:active { transform: scale(0.95); }
        .nav { position: fixed; bottom: 0; width: 100%; display: flex; background: rgba(10, 12, 22, 0.95); border-top: 1px solid rgba(0, 229, 255, 0.1); padding: 12px 0; z-index: 100; }
        .nav-btn { flex: 1; color: var(--text-muted); font-size: 11px; cursor: pointer; text-align: center; }
        .nav-btn i { display: block; font-size: 22px; margin-bottom: 5px; }
        .nav-btn.active { color: var(--cyan); }
        .energy-box { position: fixed; bottom: 90px; width: 100%; padding: 0 25px; box-sizing: border-box; }
        .bar { width: 100%; height: 10px; background: rgba(255, 255, 255, 0.05); border-radius: 10px; margin-top: 6px; overflow: hidden; }
        #fill { width: 100%; height: 100%; background: linear-gradient(90deg, #0099ff, var(--cyan)); transition: width 0.2s; }
        .pop { position: absolute; color: var(--cyan); font-size: 32px; font-weight: 800; pointer-events: none; animation: upAndFade 0.6s forwards; z-index: 1000; }
        @keyframes upAndFade { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-100px); } }
        .section-title { color: var(--text-muted); font-size: 12px; text-align: left; padding: 0 25px; margin: 25px 0 10px; text-transform: uppercase; }
        .card { background: var(--card-bg); margin: 10px 20px; padding: 18px; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; }
        .buy-btn { background: var(--cyan); color: #000; border: none; padding: 12px 20px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .ref-list { margin: 10px 20px; background: rgba(255,255,255,0.03); border-radius: 12px; padding: 10px; text-align: left; max-height: 200px; overflow-y: auto; }
        .ref-item { padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; color: var(--text-muted); }
    </style>
</head>
<body>
    <div id="game" class="page active">
        <div class="top-bar">
            <div class="stat-item">За тап<br><span id="t-val" class="stat-val">+1</span></div>
            <div class="stat-item">Лига<br><span id="l-val" class="stat-val">Bronze</span></div>
            <div class="stat-item">В час<br><span id="p-val" class="stat-val">0</span></div>
        </div>
        <div class="balance-box"><i class="fas fa-coins"></i><span id="b-disp">0</span></div>
        <div class="fox-btn" id="clicker"><img src="logo.jpg" alt="Fox"></div>
        <div class="energy-box">
            <div style="font-size: 13px; text-align: left; color: var(--text-muted);">⚡ <span id="e-val">1000</span> / 1000</div>
            <div class="bar"><div id="fill"></div></div>
        </div>
    </div>

    <div id="shop" class="page">
        <h2 style="margin-top:25px;">МАЙНИНГ</h2>
        <div class="section-title">Сила тапа</div>
        <div class="card"><div><b>Острые когти</b><br><small>Тап +2</small><br>1,000</div><button class="buy-btn" onclick="window.buyItem('tap', 1000, 2, this)">Купить</button></div>
        <div class="card"><div><b>Лисий прыжок</b><br><small>Тап +5</small><br>5,000</div><button class="buy-btn" onclick="window.buyItem('tap', 5000, 5, this)">Купить</button></div>
        <div class="section-title">Пассивный доход</div>
        <div class="card"><div><b>Ночной охотник</b><br><small>+150/час</small><br>500</div><button class="buy-btn" onclick="window.buyItem('mine', 500, 150, this)">Купить</button></div>
        <div class="card"><div><b>Скрытая нора</b><br><small>+400/час</small><br>2,500</div><button class="buy-btn" onclick="window.buyItem('mine', 2500, 400, this)">Купить</button></div>
    </div>

    <div id="friends" class="page">
        <h2 style="margin-top:25px;">ДРУЗЬЯ</h2>
        <div class="card" style="flex-direction: column; padding: 25px; gap: 15px;">
            <p style="margin:0">За каждого друга +1,000 монет</p>
            <button class="buy-btn" style="width: 100%" onclick="window.invite()">Пригласить друга</button>
        </div>
        <div class="section-title">Ваши приглашенные:</div>
        <div id="ref-container" class="ref-list">
            <div class="ref-item">Список пуст...</div>
        </div>
    </div>
    
    <div class="nav">
        <div class="nav-btn active" onclick="window.showTab('game', this)"><i class="fas fa-coins"></i>Exchange</div>
        <div class="nav-btn" onclick="window.showTab('shop', this)"><i class="fas fa-hammer"></i>Mine</div>
        <div class="nav-btn" onclick="window.showTab('friends', this)"><i class="fas fa-user-friends"></i>Friends</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCmPLm7KaL3k9S2sXp_zI5Z_gaMX6mW3M", authDomain: "foxrush-2777e.firebaseapp.com", projectId: "foxrush-2777e", storageBucket: "foxrush-2777e.firebasestorage.app", messagingSenderId: "576027265080", appId: "1:576027265080:web:2bba34cb4846a21d703ecd" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const tg = window.Telegram.WebApp;
        const userId = tg.initDataUnsafe?.user?.id ? String(tg.initDataUnsafe.user.id) : "test_user";
        const userName = tg.initDataUnsafe?.user?.first_name || "Лисенок";

        window.balance = 0; window.energy = 1000; window.pph = 0; window.tapValue = 1;
        const LEAGUES = [ { name: "Bronze", min: 0, color: "#cd7f32" }, { name: "Silver", min: 1000, color: "#c0c0c0" }, { name: "Gold", min: 5000, color: "#ffd700" }, { name: "Diamond", min: 15000, color: "#b9f2ff" } ];
        let saveTimeout;

        window.loadData = async function() {
            try {
                const docRef = doc(db, "players", userId);
                const docSnap = await getDoc(docRef);
                
                if (docSnap.exists()) {
                    const d = docSnap.data();
                    window.balance = d.balance || 0;
                    window.pph = d.pph || 0;
                    window.tapValue = d.tapValue || 1;
                    window.energy = d.energy !== undefined ? d.energy : 1000;
                    if(d.referrals) window.renderRefs(d.referrals);
                    
                    if (d.lastSave) {
                        const secondsOffline = Math.floor((Date.now() - d.lastSave) / 1000);
                        const offlineProfit = Math.floor((window.pph / 3600) * secondsOffline);
                        window.balance += offlineProfit;
                        window.energy = Math.min(1000, window.energy + secondsOffline);
                    }
                } else {
                    const startParam = tg.initDataUnsafe?.start_param;
                    if (startParam && startParam !== userId) {
                        const referrerRef = doc(db, "players", startParam);
                        const referrerSnap = await getDoc(referrerRef);
                        if (referrerSnap.exists()) {
                            await updateDoc(referrerRef, {
                                balance: (referrerSnap.data().balance || 0) + 1000,
                                referrals: arrayUnion(userName)
                            });
                        }
                    }
                    await setDoc(docRef, { balance: 0, pph: 0, tapValue: 1, energy: 1000, referrals: [], lastSave: Date.now() });
                }
                window.updateVisuals();
            } catch(e) { console.error(e); }
        };

        window.renderRefs = function(refs) {
            const container = document.getElementById('ref-container');
            if(refs.length > 0) {
                container.innerHTML = refs.map(name => `<div class="ref-item"><i class="fas fa-user"></i> ${name}</div>`).join('');
            }
        };

        window.saveData = async function() {
            try {
                const docRef = doc(db, "players", userId);
                await updateDoc(docRef, { balance: window.balance, pph: window.pph, tapValue: window.tapValue, energy: window.energy, lastSave: Date.now() });
            } catch (e) { console.error(e); }
        };

        window.triggerSave = function() {
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(window.saveData, 1000);
        };

        window.updateVisuals = function() {
            document.getElementById('b-disp').innerText = Math.floor(window.balance).toLocaleString();
            document.getElementById('e-val').innerText = Math.floor(window.energy);
            document.getElementById('fill').style.width = (window.energy/10) + '%';
            document.getElementById('p-val').innerText = window.pph.toLocaleString();
            document.getElementById('t-val').innerText = `+${window.tapValue}`;
            let cur = LEAGUES[0];
            for (let l of LEAGUES) { if (window.balance >= l.min) cur = l; }
            const el = document.getElementById('l-val'); el.innerText = cur.name; el.style.color = cur.color;
        };

        const clicker = document.getElementById('clicker');
        clicker.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (window.energy >= window.tapValue) {
                window.balance += window.tapValue; window.energy -= window.tapValue;
                let p = document.createElement('div'); p.className = 'pop'; p.innerText = `+${window.tapValue}`;
                p.style.left = e.touches[0].clientX + 'px'; p.style.top = e.touches[0].clientY + 'px';
                document.body.appendChild(p); setTimeout(() => p.remove(), 600);
                window.updateVisuals(); window.triggerSave();
                if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            }
        });

        window.showTab = function(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            window.saveData();
        };

        window.buyItem = function(t, p, v, b) {
            if (window.balance >= p) {
                window.balance -= p; if (t === 'tap') window.tapValue += v; else window.pph += v;
                window.updateVisuals(); window.saveData();
            }
        };

        window.invite = function() {
            const inviteLink = `https://t.me/FoxRush_bot?start=${userId}`;
            tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(inviteLink)}&text=Заходи в FoxRush и получай бонусы!`);
        };

        setInterval(() => { if(window.energy < 1000) { window.energy = Math.min(1000, window.energy + 1); window.updateVisuals(); } }, 1000);
        setInterval(() => { if(window.pph > 0) { window.balance += (window.pph / 60); window.updateVisuals(); } window.saveData(); }, 60000);
        
        tg.expand(); window.loadData();
    </script>
</body>
</html>
